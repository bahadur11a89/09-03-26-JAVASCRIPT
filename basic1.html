<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
    var name = "Alice";
    console.error("Hello, " + name + "! This is an error message.");    
    console.warn("Hello, " + name + "! This is a warning message.");
    console.info("Hello, " + name + "! This is an informational message."); 
    console.debug("Hello, " + name + "! This is a debug message."); 
    

    var name = "Bob";

    let name1 = "Charlie";
    name1 = "Dave"; // This will work, but it's not recommended to reassign a variable declared with let    

    const name2 = "Eve";
    // name2 = "Frank"; // This will cause an error because you cannot reassign a variable declared with const  
    console.log(name2);


    
</script>
    
</head>
<body>
        <h1>Hello, World!</h1>

</body>
</html>
